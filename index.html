<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Certificates & Badges</title>
    <style>
      :root {
        --bg: #0b0f12;
        --card: #0f1720;
        --text: #e6eef6;
        --muted: #9aa6b2;
        --accent: #58a6ff;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.6;
        padding: 3rem 1rem;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        background: var(--card);
        padding: 2.25rem;
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(12, 18, 25, 0.06);
        border: 1px solid rgba(12, 18, 25, 0.04);
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      header h1 {
        margin: 0;
        font-size: 2rem;
      }
      header p {
        color: var(--muted);
        margin-top: 0.5rem;
      }
      h2 {
        margin-top: 2rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid #1f2937;
        padding-bottom: 0.5rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 1.5rem;
        align-items: center;
        justify-items: center;
      }
      .cert-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1.5rem;
        justify-items: center;
      }
      .card {
        background: #1e293b;
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        transition: transform 0.2s;
        width: 100%;
        box-sizing: border-box;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .card img {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
      }
      .badge-card img {
        max-width: 130px;
      }
      a {
        text-decoration: none;
        color: inherit;
        display: block;
      }
      p.label {
        margin: 0.75rem 0 0 0;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text);
      }
      @media (max-width: 480px) {
        body {
          padding: 1.25rem;
        }
        .wrap {
          padding: 1rem;
        }
      }
    </style>
  </head>
